<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МОНТАЖ·CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">МОНТАЖ<span>·</span>CRM</div>
  <button type="button" class="header-btn-new" id="btnNewLead" onclick="toggleNewLeadForm()">＋ Новый лид</button>
  <button type="button" class="header-btn-new header-btn-import" id="btnImportCsv" onclick="toggleCsvImportModal()">Импорт CSV</button>
  <div class="hstat"><div class="dot dot-live"></div>Авито синхронизирован</div>
  <div class="header-stats">
    <div class="hstat"><div class="dot dot-hot"></div>Горячих: <b id="cntHot">0</b></div>
    <div class="hstat"><div class="dot dot-ok"></div>Клиентов: <b id="cntClient">0</b></div>
    <div class="hstat">Всего лидов: <b id="cntAll">0</b></div>
  </div>
</header>

<div class="main-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="new-lead-form-wrap" id="newLeadFormWrap" style="display:none">
      <div class="new-lead-form">
        <div class="nlf-title">Новый лид</div>
        <form id="newLeadForm" onsubmit="return submitNewLeadForm(event)">
          <label class="nlf-label">Имя <span class="nlf-req">*</span></label>
          <input type="text" name="name" class="nlf-input" required placeholder="Имя клиента">
          <label class="nlf-label">Телефон</label>
          <input type="text" name="phone" class="nlf-input" placeholder="+7 ...">
          <label class="nlf-label">Ссылка Авито</label>
          <input type="text" name="avito_link" class="nlf-input" placeholder="https://...">
          <label class="nlf-label">Адрес</label>
          <input type="text" name="address" class="nlf-input" placeholder="Адрес объекта">
          <label class="nlf-label">Тип объекта</label>
          <select name="object_type" class="nlf-select" id="newLeadObjectType"></select>
          <label class="nlf-label">Бюджет</label>
          <select name="budget" class="nlf-select" id="newLeadBudget"></select>
          <label class="nlf-label">Статус</label>
          <select name="status" class="nlf-select" id="newLeadStatus"></select>
          <label class="nlf-label">Комментарий</label>
          <textarea name="comment" class="nlf-textarea" placeholder="Комментарий" rows="2"></textarea>
          <div class="nlf-actions">
            <button type="submit" class="dbtn primary">Сохранить</button>
            <button type="button" class="dbtn" onclick="cancelNewLeadForm()">Отмена</button>
          </div>
        </form>
      </div>
    </div>
    <div class="sidebar-top">
      <div class="search-box">
        <span style="font-size:12px;opacity:.4">🔍</span>
        <input type="text" id="searchInput" placeholder="Имя, адрес, комментарий..." oninput="filterLeads()">
      </div>
      <div class="filter-row" id="filterRow"></div>
    </div>
    <div class="leads-list" id="leadsList"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detail">
    <div class="empty"><div class="empty-ico">🏗️</div><div>Выберите лида</div></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="rpanel">
    <div class="rp-title">АНАЛИТИКА</div>
    <div class="rp-scroll">

      <div>
        <div class="rp-sec">📊 Воронка статусов</div>
        <div id="funnelList"></div>
      </div>

      <div class="div"></div>

      <div>
        <div class="rp-sec">📈 Итоги</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="stat-val" style="color:var(--hot)" id="s1">0</div><div class="stat-lbl">Горячих</div></div>
          <div class="stat-box"><div class="stat-val" style="color:var(--client)" id="s2">0</div><div class="stat-lbl">Клиентов</div></div>
          <div class="stat-box"><div class="stat-val" style="color:var(--accent)" id="s3">0</div><div class="stat-lbl">Повторно</div></div>
          <div class="stat-box"><div class="stat-val" style="color:var(--text2)" id="s4">0</div><div class="stat-lbl">Слив</div></div>
        </div>
      </div>

      <div class="div"></div>

      <div>
        <div class="rp-sec">🔔 Требуют внимания</div>
        <div id="alertsList"></div>
      </div>

      <div class="div"></div>

      <div>
        <div class="rp-sec">💰 Бюджеты лидов</div>
        <div id="budgetBars"></div>
      </div>

    </div>
  </div>
</div>

<!-- CSV Import Modal -->
<div class="csv-import-overlay" id="csvImportOverlay" style="display:none">
  <div class="csv-import-modal">
    <div class="csv-import-title">Импорт CSV</div>
    <div class="csv-import-drop" id="csvImportDrop" ondragover="handleCsvDragOver(event)" ondragleave="handleCsvDragLeave(event)" ondrop="handleCsvDrop(event)">
      <input type="file" id="csvImportFileInput" accept=".csv" style="display:none" onchange="onCsvFileSelected(event)">
      <div class="csv-import-drop-text" id="csvImportDropText">Перетащите .csv файл сюда или нажмите для выбора</div>
    </div>
    <div class="csv-import-preview" id="csvImportPreview" style="display:none">
      <div class="csv-import-preview-count" id="csvImportPreviewCount"></div>
      <div class="csv-import-preview-actions">
        <button type="button" class="dbtn primary" onclick="doCsvImport()">Импортировать</button>
        <button type="button" class="dbtn" onclick="cancelCsvImport()">Отмена</button>
      </div>
    </div>
    <button type="button" class="csv-import-close" onclick="toggleCsvImportModal()" aria-label="Закрыть">×</button>
  </div>
</div>
</body>
</html>
